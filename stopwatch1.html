<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Stopwatch</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(15, 23, 42, 0.88);
      --text: #eff6ff;
      --muted: #bfdbfe;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --success: #34d399;
      --danger: #fb7185;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(56,189,248,0.12), transparent 25%),
        linear-gradient(135deg, #020617, #111827 45%, #1f2937);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(100%, 420px);
      background: var(--card);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.45);
      padding: 24px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
      text-align: center;
    }

    p {
      color: var(--muted);
      text-align: center;
      margin-bottom: 18px;
      font-size: 0.95rem;
    }

    .display {
      text-align: center;
      font-size: clamp(2.4rem, 9vw, 4rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .start { background: #34d399; color: #052e16; }
    .pause { background: #fbbf24; color: #422006; }
    .reset { background: #fca5a5; color: #450a0a; }
    .lap { background: #bfdbfe; color: #172554; }

    .lap-list {
      list-style: none;
      display: grid;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      padding-right: 4px;
    }

    .lap-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.12);
      padding: 10px 12px;
      font-size: 0.95rem;
    }

    .lap-label { color: var(--muted); }
    .lap-time { font-variant-numeric: tabular-nums; font-weight: 700; }
  </style>
</head>
<body>
  <main class="app">
    <h1>Interactive Stopwatch</h1>
    <p>Start, pause, reset, and save lap times with accurate interval tracking.</p>
    <div class="display" id="display">00:00.00</div>

    <div class="controls">
      <button class="start" id="startBtn">Start</button>
      <button class="pause" id="pauseBtn">Pause</button>
      <button class="lap" id="lapBtn">Lap</button>
      <button class="reset" id="resetBtn">Reset</button>
    </div>

    <ul class="lap-list" id="lapList"></ul>
  </main>

  <script>
    const display = document.getElementById('display');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapList = document.getElementById('lapList');

    let startTime = 0;
    let elapsed = 0;
    let timerId = null;
    let isRunning = false;
    let lapCounter = 1;

    function formatTime(ms) {
      const centiseconds = Math.floor(ms / 10) % 100;
      const seconds = Math.floor(ms / 1000) % 60;
      const minutes = Math.floor(ms / 60000) % 60;
      const hours = Math.floor(ms / 3600000);

      return [hours, minutes, seconds]
        .map((v) => String(v).padStart(2, '0'))
        .join(':') + '.' + String(centiseconds).padStart(2, '0');
    }

    function updateDisplay() {
      display.textContent = formatTime(elapsed);
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startTime = Date.now() - elapsed;
      timerId = setInterval(() => {
        elapsed = Date.now() - startTime;
        updateDisplay();
      }, 10);
    }

    function pauseTimer() {
      if (!isRunning) return;
      clearInterval(timerId);
      isRunning = false;
      elapsed = Date.now() - startTime;
      updateDisplay();
    }

    function resetTimer() {
      clearInterval(timerId);
      isRunning = false;
      elapsed = 0;
      lapCounter = 1;
      updateDisplay();
      lapList.innerHTML = '';
    }

    function addLap() {
      if (!isRunning && elapsed === 0) return;
      const li = document.createElement('li');
      li.className = 'lap-item';
      li.innerHTML = `
        <span class="lap-label">Lap ${lapCounter++}</span>
        <span class="lap-time">${formatTime(elapsed)}</span>
      `;
      lapList.prepend(li);
    }

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    lapBtn.addEventListener('click', addLap);
    resetBtn.addEventListener('click', resetTimer);

    updateDisplay();
  </script>
</body>
</html>
